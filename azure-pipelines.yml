trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'user-service'
  acrName: 'microacr123'
  tag: '$(Build.BuildId)'

stages:

# ========================
# 🔹 STAGE 1: BUILD
# ========================
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:
    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.x'

    - script: |
        cd user-service
        npm install
      displayName: 'Install dependencies'

    - task: Docker@2
      displayName: 'Build and Push Image'
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: '$(imageName)'
        command: buildAndPush
        Dockerfile: 'user-service/Dockerfile'
        tags: |
          $(tag)

    - publish: $(System.DefaultWorkingDirectory)/k8s
      artifact: manifests
      displayName: 'Publish Kubernetes Manifests'

# ========================
# 🔹 STAGE 2: DEV
# ========================
- stage: Dev
  displayName: Deploy to Dev
  dependsOn: Build
  jobs:
  - deployment: DevDeploy
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
            displayName: 'Create Dev Namespace'

          - task: KubernetesManifest@0
            displayName: 'Deploy to Dev AKS'
            inputs:
              action: deploy
              kubernetesServiceConnection: 'AKS-Service-Connection'
              namespace: 'dev'
              manifests: |
                $(Pipeline.Workspace)/manifests/deployment.yaml
                $(Pipeline.Workspace)/manifests/service.yaml
              containers: |
                $(acrName).azurecr.io/$(imageName):$(tag)

# ========================
# 🔹 STAGE 3: QA
# ========================
- stage: QA
  displayName: Deploy to QA
  dependsOn: Dev
  jobs:
  - deployment: QADeploy
    environment: 'qa'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              kubectl create namespace qa --dry-run=client -o yaml | kubectl apply -f -
            displayName: 'Create QA Namespace'

          - task: KubernetesManifest@0
            displayName: 'Deploy to QA AKS'
            inputs:
              action: deploy
              kubernetesServiceConnection: 'AKS-Service-Connection'
              namespace: 'qa'
              manifests: |
                $(Pipeline.Workspace)/manifests/deployment.yaml
                $(Pipeline.Workspace)/manifests/service.yaml
              containers: |
                $(acrName).azurecr.io/$(imageName):$(tag)

# ========================
# 🔹 STAGE 4: STAGE
# ========================
- stage: Stage
  displayName: Deploy to Stage
  dependsOn: QA
  jobs:
  - deployment: StageDeploy
    environment: 'stage'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              kubectl create namespace stage --dry-run=client -o yaml | kubectl apply -f -
            displayName: 'Create Stage Namespace'

          - task: KubernetesManifest@0
            displayName: 'Deploy to Stage AKS'
            inputs:
              action: deploy
              kubernetesServiceConnection: 'AKS-Service-Connection'
              namespace: 'stage'
              manifests: |
                $(Pipeline.Workspace)/manifests/deployment.yaml
                $(Pipeline.Workspace)/manifests/service.yaml
              containers: |
                $(acrName).azurecr.io/$(imageName):$(tag)

# ========================
# 🔹 STAGE 5: PROD
# ========================
- stage: Prod
  displayName: Deploy to Production
  dependsOn: Stage
  jobs:
  - deployment: ProdDeploy
    environment: 'prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -
            displayName: 'Create Prod Namespace'

          - task: KubernetesManifest@0
            displayName: 'Deploy to Prod AKS'
            inputs:
              action: deploy
              kubernetesServiceConnection: 'AKS-Service-Connection'
              namespace: 'prod'
              manifests: |
                $(Pipeline.Workspace)/manifests/deployment.yaml
                $(Pipeline.Workspace)/manifests/service.yaml
              containers: |
                $(acrName).azurecr.io/$(imageName):$(tag)